name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Roda todo dia à meia-noite
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LuiihsCode
          template: classic
          base: header, activity, community, repositories, metadata
          
      
          config_timezone: America/Bahia
          config_order: base.header, isocalendar, languages, habits


          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          

          plugin_languages: yes
          plugin_languages_colors: "python:#60519b, java:#31323e, luau:#bfc0d1"
          plugin_languages_details: bytes-size, percentage
          

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          config_padding: 0, 8%
          design_layout: compact
          style: |
            .header { color: #bfc0d1; }
            :root { --color-calendar-graph-day-bg: #1e202c; --color-calendar-graph-day-L1-bg: #31323e; --color-calendar-graph-day-L2-bg: #60519b; }
